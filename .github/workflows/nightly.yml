# master push: run the full suite, then publish nightly images and a single rolling
# `nightly` prerelease of the CLI binaries. Prerelease means the installer's default
# (latest stable) ignores it; install a nightly with VHRN_VERSION=nightly.
name: nightly

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/_test.yml

  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      image_tag: ${{ steps.v.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5
      - id: v
        run: |
          base=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          d=$(date -u +%Y%m%d)
          sha="${GITHUB_SHA::7}"
          echo "version=${base}-nightly.${d}.${sha}" >> "$GITHUB_OUTPUT"
          echo "image_tag=nightly-${d}-${sha}" >> "$GITHUB_OUTPUT"

  images:
    needs: [test, version]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-images.yml
    with:
      flavor: nightly
      push: true
      extra_tag: ${{ needs.version.outputs.image_tag }}

  binaries:
    needs: [test, version]
    uses: ./.github/workflows/_build-binaries.yml
    with:
      version: ${{ needs.version.outputs.version }}

  publish:
    needs: [version, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: vhrn-*
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: sha256sum vhrn-* > SHA256SUMS
      - name: Publish rolling nightly
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete nightly --cleanup-tag --yes 2>/dev/null || true
          gh release create nightly dist/* \
            --title "Nightly ${{ needs.version.outputs.version }}" \
            --notes "Rolling nightly build (\`${{ needs.version.outputs.version }}\`). Prerelease; the installer default (latest stable) ignores it. Install with VHRN_VERSION=nightly." \
            --prerelease \
            --target "${{ github.sha }}"
