# A vX.Y.Z tag cuts a release: full suite, then — after a maintainer approves the
# `release` environment — the release images and a GitHub Release with the CLI binaries
# and their checksums. Only maintainers can create v* tags (repo ruleset); see
# docs/runbooks/release.md.
name: release

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Tag must match Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          [ "$tag" = "$crate" ] || { echo "tag ${GITHUB_REF_NAME} != Cargo.toml $crate"; exit 1; }

  # The maintainer gate: the `release` environment's required reviewers pause here,
  # before anything is built or published.
  approve:
    needs: guard
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "release ${GITHUB_REF_NAME} approved"

  test:
    needs: approve
    uses: ./.github/workflows/_test.yml

  images:
    needs: [approve, test]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-images.yml
    with:
      flavor: release
      push: true

  binaries:
    needs: [approve, test]
    uses: ./.github/workflows/_build-binaries.yml
    with:
      version: ${{ github.ref_name }}

  publish:
    needs: [images, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7 # for CHANGELOG.md — the release notes source
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: vhrn-*
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: sha256sum vhrn-* > SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Notes are the tag's own CHANGELOG.md section (## <version> up to the next
          # ## heading or the link-reference block), never GitHub's auto-generated PR
          # list. The heading version is matched with surrounding [brackets] stripped,
          # so both `## X.Y.Z` and Keep a Changelog's `## [X.Y.Z]` work. Fail loudly if
          # the tag has no section rather than falling back to generated notes.
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" '
            $1=="##" { h=$2; gsub(/^\[|\]$/, "", h); if (h==ver) {cap=1; next} else if (cap) exit }
            cap && /^\[[^][]+\]:/ {exit}
            cap {print}
          ' CHANGELOG.md | sed '/./,$!d' > notes.md
          [ -s notes.md ] || { echo "::error::no CHANGELOG.md section for ${ver}"; exit 1; }
          # create on first publish; edit so a re-run corrects an existing release's body.
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file notes.md \
            || gh release edit "${GITHUB_REF_NAME}" --notes-file notes.md
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
