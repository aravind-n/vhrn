# A vX.Y.Z tag cuts a release: full suite, then — after a maintainer approves the
# `release` environment — the release images and a GitHub Release with the CLI binaries
# and their checksums. Only maintainers can create v* tags (repo ruleset); see
# docs/runbooks/release.md.
name: release

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tag must match Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          [ "$tag" = "$crate" ] || { echo "tag ${GITHUB_REF_NAME} != Cargo.toml $crate"; exit 1; }

  # The maintainer gate: the `release` environment's required reviewers pause here,
  # before anything is built or published.
  approve:
    needs: guard
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "release ${GITHUB_REF_NAME} approved"

  test:
    needs: approve
    uses: ./.github/workflows/_test.yml

  images:
    needs: [approve, test]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_build-images.yml
    with:
      flavor: release
      push: true

  binaries:
    needs: [approve, test]
    uses: ./.github/workflows/_build-binaries.yml
    with:
      version: ${{ github.ref_name }}

  publish:
    needs: [images, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: vhrn-*
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: sha256sum vhrn-* > SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes 2>/dev/null || true
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
