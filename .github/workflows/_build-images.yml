# Reusable: build the base, proxy, and harness images multi-arch and (optionally) push
# them to ghcr. Tags depend on `flavor`; every image gets the same set so the
# base/proxy/harness matched-set holds. Harness images FROM the base by digest, so the
# harness build only runs when pushing — a build-only PR validates base + proxy alone.
name: build-images

on:
  workflow_call:
    inputs:
      flavor:
        description: pr | nightly | release
        type: string
        required: true
      push:
        type: boolean
        default: false
      extra_tag:
        description: an extra raw tag, e.g. the immutable nightly version
        type: string
        default: ''

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  base:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vhrn-base
          tags: |
            type=ref,event=pr,enable=${{ inputs.flavor == 'pr' }}
            type=sha,prefix=pr-${{ github.event.number }}-,format=short,enable=${{ inputs.flavor == 'pr' }}
            type=raw,value=nightly,enable=${{ inputs.flavor == 'nightly' }}
            type=sha,prefix=sha-,enable=${{ inputs.flavor == 'nightly' }}
            type=ref,event=tag,enable=${{ inputs.flavor == 'release' }}
            type=raw,value=latest,enable=${{ inputs.flavor == 'release' }}
            type=raw,value=${{ inputs.extra_tag }},enable=${{ inputs.extra_tag != '' }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: image/base
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vhrn-proxy
          tags: |
            type=ref,event=pr,enable=${{ inputs.flavor == 'pr' }}
            type=sha,prefix=pr-${{ github.event.number }}-,format=short,enable=${{ inputs.flavor == 'pr' }}
            type=raw,value=nightly,enable=${{ inputs.flavor == 'nightly' }}
            type=sha,prefix=sha-,enable=${{ inputs.flavor == 'nightly' }}
            type=ref,event=tag,enable=${{ inputs.flavor == 'release' }}
            type=raw,value=latest,enable=${{ inputs.flavor == 'release' }}
            type=raw,value=${{ inputs.extra_tag }},enable=${{ inputs.extra_tag != '' }}
      - uses: docker/build-push-action@v6
        with:
          context: proxy
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # One job per harness (add codex/aider to the matrix as they land).
  harness:
    needs: base
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        harness: [claude]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vhrn-${{ matrix.harness }}
          tags: |
            type=ref,event=pr,enable=${{ inputs.flavor == 'pr' }}
            type=sha,prefix=pr-${{ github.event.number }}-,format=short,enable=${{ inputs.flavor == 'pr' }}
            type=raw,value=nightly,enable=${{ inputs.flavor == 'nightly' }}
            type=sha,prefix=sha-,enable=${{ inputs.flavor == 'nightly' }}
            type=ref,event=tag,enable=${{ inputs.flavor == 'release' }}
            type=raw,value=latest,enable=${{ inputs.flavor == 'release' }}
            type=raw,value=${{ inputs.extra_tag }},enable=${{ inputs.extra_tag != '' }}
      - uses: docker/build-push-action@v6
        with:
          context: image/${{ matrix.harness }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE=${{ env.REGISTRY }}/${{ github.repository_owner }}/vhrn-base@${{ needs.base.outputs.digest }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
